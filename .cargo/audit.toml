# Security audit exceptions — documented suppression of dev-only advisories
# Generated: 2026-03-30
# Reviewed by: security (Sentinel)
#
# All advisories below exist ONLY in dev-dependencies (solana-sdk).
# The on-chain BPF binary (`cargo tree -e normal`) has ZERO exposure to these crates.
# Production deps: solana-program, pinocchio-token, bytemuck ONLY.
# These are identical to the accepted suppressions in percolator-prog/audit.toml.
# Will be resolved when Solana SDK 3.x+ ships (ed25519-dalek-bip32 0.3.0 → ed25519-dalek 2.x).

[advisories]
ignore = [
    # RUSTSEC-2022-0093: ed25519-dalek <2.0 double public key signing oracle
    # Source: solana-sdk (dev-dep) → solana-keypair → ed25519-dalek-bip32 → ed25519-dalek 1.0.1
    # Impact: DEV-ONLY. Not in on-chain binary. cargo tree -e normal: no ed25519-dalek.
    # Fix: Requires Solana SDK 3.x+ (ed25519-dalek-bip32 0.3.0 uses ed25519-dalek 2.x)
    "RUSTSEC-2022-0093",

    # RUSTSEC-2024-0344: curve25519-dalek <4.1.3 timing variability
    # Source: ed25519-dalek 1.0.1 → curve25519-dalek 3.2.1 (same dev-only chain)
    # Impact: DEV-ONLY. Production deps use curve25519-dalek 4.1.3 (patched, confirmed in cargo tree -e normal).
    "RUSTSEC-2024-0344",

    # RUSTSEC-2021-0145: atty 0.2.14 potential unaligned read (unsound)
    # Source: env_logger → solana-logger → solana-genesis-config (dev-only chain via solana-sdk)
    # Impact: DEV-ONLY. Not in on-chain binary.
    "RUSTSEC-2021-0145",
]
